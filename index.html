<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>QR Code SMK</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body style="text-align:center; background:#f5f5f5;">

  <h2>QR Code Pendaftaran SMK Muhammadiyah Gunung Putri</h2>
  <canvas id="qrcode"></canvas>
  <br>
  <img id="logo" src="logosmk.png" style="display:none;" />

  <script>
    const url = "https://smk-muhammadiyah-gunungputri.github.io/SPMB/";

    // Buat QR code di canvas
    QRCode.toCanvas(document.getElementById('qrcode'), url, {
      color: {
        dark: "#000080",   // biru tua
        light: "#ffffff"   // putih
      },
      errorCorrectionLevel: 'H',
      width: 300
    }, function (error) {
      if (error) console.error(error);
      console.log('QR Code berhasil dibuat!');
    });

    // Tambahkan logo di tengah
    const canvas = document.getElementById('qrcode');
    const ctx = canvas.getContext('2d');
    const logo = document.getElementById('logo');

    logo.onload = function() {
      const size = 60; // ukuran logo
      const x = (canvas.width - size) / 2;
      const y = (canvas.height - size) / 2;
      ctx.drawImage(logo, x, y, size, size);
    };
  </script>

</body>
</html>
